global:
  nodeSelector: {}
  affinity: {}
  tolerations: {}
  TZ: "UTC"

replicaCount: 1

metadata:
  labels:
    environment: dev

image:
  repository: bahmni
  name: bahmni-template-service
  tag: latest

config:
  NODE_ENV: "production"
  PORT: "http://openmrs:8080"
  OPENMRS_URL: ""
  TEMPLATES_DIR: "/etc/bahmni_config/print-templates"

service:
  type: ClusterIP
  port: 8080

autoscaling:
  enabled: false


nodeSelector: {}
affinity: {}
tolerations: {}